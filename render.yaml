services:
  - type: web
    name: ml-cylinder-api-kang0840
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py --host 0.0.0.0
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://kang0840.github.io
      - key: ADMIN_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.13.5
