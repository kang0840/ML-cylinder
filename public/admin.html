<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART CYLINDER CASE · 관리자</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d10;--panel:#141a20;--panel2:#191f26;--edge:#262f38;--bright:#3a4652;--text:#e7ebef;--muted:#6d7885;--dim:#454e58;--run:#3ddc84;--warn:#ffb020;--fault:#ff5c5c;--info:#4fc3f7;--display:'Chakra Petch',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0,rgba(79,195,247,.05),transparent 40%),radial-gradient(circle at 85% 100%,rgba(61,220,132,.04),transparent 45%),var(--bg);color:var(--text);font-family:var(--body)}button,input{font:inherit}.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.card,.panel,header{border:1px solid var(--edge);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:12px}.login-card{width:100%;max-width:370px;padding:34px 30px;text-align:center}.mark{width:46px;height:46px;border:1px solid var(--bright);border-radius:10px;margin:0 auto 16px;display:grid;place-items:center;font:13px var(--mono);color:var(--info);background:repeating-linear-gradient(135deg,#1a2128 0 6px,#151b21 6px 12px)}h1,h2,h3{font-family:var(--display)}h1{font-size:19px;margin:0 0 5px}.muted{color:var(--muted);font-size:12px}.label{display:block;text-align:left;font:10.5px var(--mono);color:var(--dim);letter-spacing:.08em;margin:20px 0 6px}input{width:100%;padding:12px 14px;border-radius:7px;background:#0c1014;border:1px solid var(--bright);color:var(--text);outline:0}input:focus{border-color:var(--info)}.message{min-height:20px;margin:8px 0;color:var(--fault);font:11.5px var(--mono)}button{padding:10px 14px;border:1px solid var(--bright);border-radius:7px;background:#182028;color:var(--text);cursor:pointer;font-family:var(--display);font-weight:600}button:hover{border-color:var(--info);color:var(--info)}button:disabled{opacity:.5;cursor:wait}.full{width:100%}.dashboard{display:none;padding:20px}.wrap{max-width:1100px;margin:auto}header{padding:16px 22px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:14px}.brand .mark{width:38px;height:38px;margin:0}h2{font-size:19px;margin:0}.actions{display:flex;align-items:center;gap:10px}#clock{font:12px var(--mono);color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.sum{padding:14px 16px}.sum label{font:10px var(--mono);color:var(--dim)}.sum strong{display:block;font:24px var(--mono);margin-top:4px}.panel{overflow:hidden;margin-bottom:16px}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--edge);gap:12px}.panel-head h3{font-size:15px;margin:0}.search{max-width:260px;padding:9px 12px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:12px 18px;border-bottom:1px solid var(--edge);white-space:nowrap}th{font:10.5px var(--mono);color:var(--dim)}td{font-size:13px}.serial{font:12.5px var(--mono)}.badge{display:inline-flex;gap:6px;align-items:center;color:var(--run);font:11px var(--mono);border:1px solid var(--bright);border-radius:20px;padding:4px 10px}.dot{width:7px;height:7px;border-radius:50%;background:var(--run);box-shadow:0 0 6px var(--run)}.settings{padding:20px;max-width:520px}.settings h3{margin-top:0}.success{color:var(--run)}.shake{animation:shake .4s}@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@media(max-width:650px){.summary{grid-template-columns:1fr}.panel-head{align-items:stretch;flex-direction:column}.search{max-width:none}.actions{flex-wrap:wrap}}
</style>
</head>
<body>
<section id="login" class="login"><div id="loginCard" class="card login-card"><div class="mark">SC</div><h1>관리자 로그인</h1><p class="muted">SMART CYLINDER CASE · 관리자 전용</p><form id="loginForm"><label class="label" for="password">ADMIN PASSWORD</label><input id="password" type="password" autocomplete="current-password" placeholder="비밀번호 입력" required><div id="loginMessage" class="message"></div><button id="loginButton" class="full">로그인</button></form></div></section>
<section id="dashboard" class="dashboard"><div class="wrap">
<header><div class="brand"><div class="mark">SC</div><div><h2>관리자 페이지</h2><div class="muted">등록된 시리얼 번호 조회 및 보안 설정</div></div></div><div class="actions"><span id="clock">--:--:--</span><button id="refresh">새로고침</button><button id="logout">로그아웃</button></div></header>
<div class="summary"><div class="card sum"><label>전체 등록</label><strong id="total">0</strong></div><div class="card sum"><label>데이터베이스</label><strong style="color:var(--run);font-size:18px">POSTGRES ONLINE</strong></div></div>
<section class="panel"><div class="panel-head"><h3>시리얼 목록</h3><input id="search" class="search" placeholder="시리얼 번호 검색"></div><div class="table-wrap"><table><thead><tr><th>시리얼 번호</th><th>상태</th><th>발급 시각</th></tr></thead><tbody id="rows"></tbody></table></div></section>
<section class="card settings"><h3>관리자 비밀번호 변경</h3><form id="changeForm"><label class="label">현재 비밀번호</label><input id="currentPassword" type="password" autocomplete="current-password" required><label class="label">새 비밀번호 (10자 이상)</label><input id="newPassword" type="password" minlength="10" autocomplete="new-password" required><label class="label">새 비밀번호 확인</label><input id="confirmPassword" type="password" minlength="10" autocomplete="new-password" required><div id="changeMessage" class="message"></div><button>비밀번호 변경</button></form></section>
</div></section>
<script>
const API=location.hostname.endsWith('github.io')?'https://ml-cylinder.onrender.com/':location.href;
let token=sessionStorage.getItem('sc-admin-token')||'',serials=[];
const el=id=>document.getElementById(id);
async function api(path,options={}){const response=await fetch(new URL(path,API),{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})}});const data=await response.json().catch(()=>({}));if(!response.ok){const error=new Error(data.message||data.error||'요청에 실패했습니다.');error.status=response.status;throw error}return data}
function showLogin(){el('dashboard').style.display='none';el('login').style.display='flex'}
function showDashboard(){el('login').style.display='none';el('dashboard').style.display='block'}
function render(){const q=el('search').value.trim().toUpperCase();const filtered=serials.filter(x=>x.serial.includes(q));el('rows').innerHTML=filtered.map(x=>`<tr><td class="serial">${x.serial}</td><td><span class="badge"><span class="dot"></span>등록 완료</span></td><td>${new Date(x.purchasedAt).toLocaleString('ko-KR')}</td></tr>`).join('')||'<tr><td colspan="3" class="muted">등록된 시리얼이 없습니다.</td></tr>';el('total').textContent=serials.length}
async function load(){try{serials=(await api('api/admin/serials')).serials;render()}catch(e){if(e.status===401){token='';sessionStorage.removeItem('sc-admin-token');showLogin()}}}
el('loginForm').addEventListener('submit',async e=>{e.preventDefault();const btn=el('loginButton'),msg=el('loginMessage');btn.disabled=true;msg.textContent='';try{const data=await api('api/admin/login',{method:'POST',body:JSON.stringify({password:el('password').value})});token=data.token;sessionStorage.setItem('sc-admin-token',token);showDashboard();await load()}catch(error){msg.textContent=error.message==='admin_not_configured'?'관리자 비밀번호가 아직 설정되지 않았습니다.':'비밀번호가 올바르지 않습니다.';el('loginCard').classList.remove('shake');void el('loginCard').offsetWidth;el('loginCard').classList.add('shake')}finally{btn.disabled=false}});
el('changeForm').addEventListener('submit',async e=>{e.preventDefault();const msg=el('changeMessage'),next=el('newPassword').value;if(next!==el('confirmPassword').value){msg.className='message';msg.textContent='새 비밀번호가 서로 다릅니다.';return}try{await api('api/admin/password',{method:'POST',body:JSON.stringify({currentPassword:el('currentPassword').value,newPassword:next})});msg.className='message success';msg.textContent='변경되었습니다. 새 비밀번호로 다시 로그인하세요.';token='';sessionStorage.removeItem('sc-admin-token');setTimeout(showLogin,1200)}catch(error){msg.className='message';msg.textContent=error.message==='invalid_current_password'?'현재 비밀번호가 올바르지 않습니다.':error.message}});
el('logout').addEventListener('click',async()=>{try{await api('api/admin/logout',{method:'POST'})}catch{}token='';sessionStorage.removeItem('sc-admin-token');showLogin()});el('refresh').addEventListener('click',load);el('search').addEventListener('input',render);setInterval(()=>el('clock').textContent=new Date().toLocaleTimeString('ko-KR',{hour12:false}),1000);if(token){showDashboard();load()}
</script>
</body></html>
